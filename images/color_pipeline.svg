<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="yuvGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rgbGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="procGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ffmpegGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700" letter-spacing="1">Color Pipeline in Video Rendering</text>
  <text x="550" y="72" text-anchor="middle" fill="#8b949e" font-size="13">imgtrans2026.py  —  drawManeuver class</text>

  <!-- ============================================ -->
  <!-- STEP 1: Source Video -->
  <!-- ============================================ -->
  <rect x="60" y="100" width="980" height="105" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="126" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="2">STEP 1</text>
  <text x="155" y="126" fill="#c9d1d9" font-size="13" font-weight="600">Source Frame Reading</text>

  <!-- Source file box -->
  <rect x="90" y="140" width="220" height="50" rx="8" fill="url(#yuvGrad)" opacity="0.15" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="162" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">Source Video</text>
  <text x="200" y="179" text-anchor="middle" fill="#818cf8" font-size="10">ProRes HQ  yuv422p10le</text>

  <!-- Arrow -->
  <line x1="320" y1="165" x2="390" y2="165" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="355" y="157" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">PyAV</text>

  <!-- Decode box -->
  <rect x="400" y="138" width="290" height="55" rx="8" fill="#1a1e2a" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="158" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="500">frame.to_ndarray(format=</text>
  <text x="545" y="175" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">"rgb48le"</text>
  <text x="678" y="175" fill="#c9d1d9" font-size="11">)</text>

  <!-- Arrow -->
  <line x1="700" y1="165" x2="770" y2="165" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- YUV to RGB label -->
  <rect x="780" y="138" width="240" height="55" rx="8" fill="url(#rgbGrad)" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="900" y="158" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">YUV 4:2:2 10bit  ->  RGB 48bit</text>
  <text x="900" y="176" text-anchor="middle" fill="#6ee7b7" font-size="10">BT.2020nc matrix (auto-detected)</text>

  <!-- ============================================ -->
  <!-- STEP 2: Slit-Scan Composition -->
  <!-- ============================================ -->
  <rect x="60" y="225" width="980" height="120" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="251" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="2">STEP 2</text>
  <text x="155" y="251" fill="#c9d1d9" font-size="13" font-weight="600">Slit-Scan Composition</text>

  <!-- numpy buffer -->
  <rect x="90" y="265" width="200" height="65" rx="8" fill="url(#rgbGrad)" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="190" y="287" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">RGB48 numpy buffer</text>
  <text x="190" y="304" text-anchor="middle" fill="#f87171" font-size="10">uint16  [H x W x 3]</text>
  <text x="190" y="320" text-anchor="middle" fill="#8b949e" font-size="9">source frame pixels</text>

  <!-- Arrow + data mapping -->
  <line x1="300" y1="297" x2="390" y2="297" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="345" y="289" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="500">data[:,:,1]</text>
  <text x="345" y="313" text-anchor="middle" fill="#8b949e" font-size="9">z-coordinate</text>

  <!-- Slit scan box -->
  <rect x="400" y="262" width="300" height="70" rx="8" fill="url(#procGrad)" opacity="0.12" stroke="#f59e0b" stroke-width="1"/>
  <text x="550" y="285" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">Slit Remapping</text>
  <text x="550" y="303" text-anchor="middle" fill="#fbbf24" font-size="10">for each output pixel:</text>
  <text x="550" y="319" text-anchor="middle" fill="#d4d4d4" font-size="10">output[y, x] = source_frame[z][slit_pos]</text>

  <!-- Arrow -->
  <line x1="710" y1="297" x2="780" y2="297" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Output buffer -->
  <rect x="790" y="265" width="230" height="65" rx="8" fill="url(#rgbGrad)" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="905" y="287" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">Composited RGB Frame</text>
  <text x="905" y="304" text-anchor="middle" fill="#f87171" font-size="10">uint16  [H x W x 3]</text>
  <text x="905" y="320" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">No color conversion</text>

  <!-- ============================================ -->
  <!-- STEP 3: HDR Transfer (Optional) -->
  <!-- ============================================ -->
  <rect x="60" y="365" width="980" height="140" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="391" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="2">STEP 3</text>
  <text x="155" y="391" fill="#c9d1d9" font-size="13" font-weight="600">HDR Transfer Conversion (Optional)</text>
  <text x="555" y="391" fill="#8b949e" font-size="11">force_hdr_mode != input_transfer</text>

  <!-- HLG to PQ path -->
  <rect x="90" y="405" width="280" height="85" rx="8" fill="url(#hdrGrad)" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="230" y="425" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">HLG -> PQ</text>
  <text x="230" y="445" text-anchor="middle" fill="#c084fc" font-size="10">rgb / 65535.0</text>
  <text x="230" y="460" text-anchor="middle" fill="#c084fc" font-size="10">-> hlg_eotf() -> Linear</text>
  <text x="230" y="475" text-anchor="middle" fill="#c084fc" font-size="10">-> pq_oetf() -> PQ</text>
  <text x="230" y="485" text-anchor="middle" fill="#c084fc" font-size="9">-> clip * 65535 -> uint16</text>

  <!-- PQ to HLG path -->
  <rect x="410" y="405" width="280" height="85" rx="8" fill="url(#hdrGrad)" opacity="0.1" stroke="#ec4899" stroke-width="1"/>
  <text x="550" y="425" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">PQ -> HLG</text>
  <text x="550" y="445" text-anchor="middle" fill="#f472b6" font-size="10">rgb / 65535.0</text>
  <text x="550" y="460" text-anchor="middle" fill="#f472b6" font-size="10">-> pq_eotf() -> Linear</text>
  <text x="550" y="475" text-anchor="middle" fill="#f472b6" font-size="10">-> hlg_oetf() -> HLG</text>
  <text x="550" y="485" text-anchor="middle" fill="#f472b6" font-size="9">-> clip * 65535 -> uint16</text>

  <!-- Passthrough path -->
  <rect x="730" y="405" width="290" height="85" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="875" y="425" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Same Transfer (Passthrough)</text>
  <text x="875" y="450" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">No Conversion</text>
  <text x="875" y="470" text-anchor="middle" fill="#6ee7b7" font-size="10">rgb16 = frame.astype(np.uint16)</text>
  <text x="875" y="485" text-anchor="middle" fill="#4ade80" font-size="9">Maximum precision preserved</text>

  <!-- ============================================ -->
  <!-- STEP 4: FFmpeg Encode -->
  <!-- ============================================ -->
  <rect x="60" y="525" width="980" height="145" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="551" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="2">STEP 4</text>
  <text x="155" y="551" fill="#c9d1d9" font-size="13" font-weight="600">FFmpeg Encode (RGB -> YUV)</text>

  <!-- stdin pipe -->
  <rect x="90" y="565" width="240" height="90" rx="8" fill="url(#rgbGrad)" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="210" y="585" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">stdin: rawvideo rgb48le</text>
  <rect x="105" y="593" width="210" height="50" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="210" y="610" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-color_primaries bt2020</text>
  <text x="210" y="623" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-color_trc smpte2084</text>
  <text x="210" y="636" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-colorspace bt2020nc</text>

  <!-- Arrow with label -->
  <line x1="340" y1="610" x2="430" y2="610" stroke="#10b981" stroke-width="2" marker-end="url(#arrowWhite)" filter="url(#glow)"/>
  <text x="385" y="600" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700">RGB->YUV</text>
  <text x="385" y="625" text-anchor="middle" fill="#6ee7b7" font-size="9">BT.2020nc</text>
  <text x="385" y="636" text-anchor="middle" fill="#6ee7b7" font-size="9">matrix</text>

  <!-- Encode options -->
  <rect x="440" y="565" width="285" height="90" rx="8" fill="url(#ffmpegGrad)" opacity="0.12" stroke="#10b981" stroke-width="1"/>
  <text x="582" y="585" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Encode + Color Metadata</text>
  <rect x="455" y="593" width="255" height="50" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="582" y="610" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-c:v prores_ks / libx265</text>
  <text x="582" y="623" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-color_primaries bt2020  (output tag)</text>
  <text x="582" y="636" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="500">-color_trc smpte2084  (output tag)</text>

  <!-- Arrow -->
  <line x1="735" y1="610" x2="790" y2="610" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Output file -->
  <rect x="800" y="565" width="220" height="90" rx="8" fill="url(#outGrad)" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="910" y="590" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Output Video</text>
  <text x="910" y="610" text-anchor="middle" fill="#a78bfa" font-size="10">ProRes: yuv422p10le</text>
  <text x="910" y="625" text-anchor="middle" fill="#a78bfa" font-size="10">HEVC: yuv420p10le</text>
  <text x="910" y="642" text-anchor="middle" fill="#818cf8" font-size="9">BT.2020 / PQ or HLG / tv range</text>

  <!-- ============================================ -->
  <!-- Comparison: A/B Split vs C/D Render -->
  <!-- ============================================ -->
  <text x="550" y="705" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Comparison: Direct Split vs Rendered Output</text>

  <!-- A/B Split -->
  <rect x="60" y="720" width="490" height="85" rx="10" fill="#0d2818" stroke="#22c55e" stroke-width="1.5"/>
  <text x="305" y="745" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">A/B Segments (ffmpeg direct split)</text>
  <text x="305" y="765" text-anchor="middle" fill="#6ee7b7" font-size="11">Source YUV  --framestep-->  Output YUV</text>
  <text x="305" y="785" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">No color space conversion. Pixel-perfect.</text>
  <text x="305" y="798" text-anchor="middle" fill="#22c55e" font-size="9">yuv422p10le -> yuv422p10le  (-c:v prores_ks re-encode, same colorspace)</text>

  <!-- C/D Render -->
  <rect x="570" y="720" width="470" height="85" rx="10" fill="#1a1028" stroke="#a855f7" stroke-width="1.5"/>
  <text x="805" y="745" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">C/D Segments (Python rendered)</text>
  <text x="805" y="765" text-anchor="middle" fill="#c084fc" font-size="11">Source YUV -> RGB48 -> [process] -> RGB48 -> YUV</text>
  <text x="805" y="785" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">Two color conversions (YUV<->RGB)</text>
  <text x="805" y="798" text-anchor="middle" fill="#a855f7" font-size="9">Input-side color metadata required for correct BT.2020 matrix</text>

  <!-- ============================================ -->
  <!-- Key Warning -->
  <!-- ============================================ -->
  <rect x="60" y="825" width="980" height="78" rx="10" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="85" y="852" fill="#fcd34d" font-size="20">!</text>
  <text x="110" y="852" fill="#fbbf24" font-size="13" font-weight="700">Critical: Input-Side Color Metadata</text>
  <text x="110" y="872" fill="#fde68a" font-size="11">Without  -color_primaries bt2020 -colorspace bt2020nc  on the rawvideo input,</text>
  <text x="110" y="889" fill="#fde68a" font-size="11">FFmpeg defaults to BT.709 for RGB->YUV conversion, causing incorrect green/red rendering in BT.2020 HDR content.</text>

</svg>
